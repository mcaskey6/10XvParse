name: Analysis_7

# The suffix for the R1 and R2 FASTA files dumped from fasterq-dump. For some reason these change across datasets
read_num:
  10x:
    R1: 1
    R2: 2
  10x_hashtags:
    R1: 1
    R2: 2
  parse:
    R1: 1
    R2: 2

# Files to generate the kallisto index
reference:
 species: human
 fasta: https://ftp.ensembl.org/pub/release-115/fasta/homo_sapiens/dna/Homo_sapiens.GRCh38.dna.primary_assembly.fa.gz
 gtf: https://ftp.ensembl.org/pub/release-115/gtf/homo_sapiens/Homo_sapiens.GRCh38.115.gtf.gz

# kit name
tech:
 10x: 10XV4
 10x_hashtags: 10XV4
 parse: WT_mini_v3

# Optional R2 trim lengths (bp) for feature barcode libraries.
# Multi-seq 8-mer barcodes need trimming because the downstream poly-A -> genomic
# sequence transition creates k-mers that collide with kite index entries from
# other barcodes, dropping pseudoalignment
trim:
 10x_hashtags: 15